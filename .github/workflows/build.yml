name: bluebuild
on:
  schedule:
    - cron: "0 0 * * *" # Jede Nacht automatisch aktualisieren
  push:
    branches:
      - main
    paths:
      - "recipes/**"
      - "modules/**"
      - ".github/workflows/build.yml"
  workflow_dispatch: # Erlaubt manuelles Starten per Knopfdruck

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11.0
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }} # DIESE ZEILE WIEDER EINFÜGEN!
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          
