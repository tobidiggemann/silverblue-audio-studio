# yaml-language-server: $schema=https://blue-build.org
name: silverblue-audio-studio
description: Mein unzerstörbares Audio- und Entwickler-System
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: rpm-ostree
    install:
      - waydroid
      - distrobox

  - type: default-flatpaks
    configurations:
      - remote: flathub
        install:
          - org.gnome.Evolution
          - org.mozilla.Thunderbird
          - desktop.onlyoffice.ONLYOFFICE
          - com.github.jeromerobert.pdfarranger
          - org.mozilla.firefox
          - org.audacityteam.Audacity
